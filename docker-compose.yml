services:
  pdf-service:
    build: ./node
    ports:
      - "3000:3000"
    volumes:
      - ./node/output:/app/output
    environment:
      - BASE_URL=http://nginx
    depends_on:
      - nginx

  php:
    build: ./php
    volumes:
      - ./php/public:/var/www/html

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./php/public:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php